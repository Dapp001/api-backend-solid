services:
  mysql:
    image: mysql:8.0
    container_name: mysql_api_backend_solid
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: api_backend_solid
    ports:
      - "3308:3306"
    volumes:
      - mysql_api_data:/var/lib/mysql
    networks:
      - api_network

  api:
    build: .
    container_name: node_api_backend_solid
    restart: always
    depends_on:
      - mysql
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: api_backend_solid
      DB_PORT: 3306
      JWT_SECRET: clave_super_secreta_api_backend
      JWT_EXPIRES_IN: 1h
    volumes:
      - ./uploads:/app/uploads
    networks:
      - api_network

volumes:
  mysql_api_data:

networks:
  api_network: